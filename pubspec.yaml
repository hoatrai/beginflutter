name: beginflutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  video_thumbnail: ^0.5.6
  video_player: ^2.9.1
  visibility_detector: ^0.4.0+2
  share_plus: ^11.1.0

  # 🆕 Cho tính năng "Thiệp mời kèo" (pages/invite_card_page.dart):
  # qr_flutter vẽ QR code thuần Dart, path_provider lấy thư mục tạm để
  # ghi ảnh PNG của thiệp trước khi share/lưu.
  qr_flutter: ^4.1.0
  path_provider: ^2.1.4

  # Các thư viện hiện tại
  http: ^0.13.6
  flutter_html: ^3.0.0-beta.2
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.1
  video_compress: ^3.1.3

  # Hiệu ứng animation
  flutter_spinkit: ^5.2.2

  image_picker: ^0.8.7+5
  file_picker: ^10.3.8
  image: ^4.1.3

  # Firebase
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2

  # SharedPreferences
  shared_preferences: ^2.3.2

  # WebSocket thay cho PhoenixSocket
  web_socket_channel: ^3.0.3

  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  phoenix_socket: 0.7.6

  # google_maps_flutter: ^2.6.0   # ❌ xóa dòng này
  flutter_map: ^4.0.0
  latlong2: ^0.8.1
  geolocator: ^10.0.0
  geocoding: ^2.1.0
  shimmer: ^3.0.0
  flutter_map_marker_popup: ^5.1.0

  # 🔹 Thêm để chạy foreground service trên Android
  flutter_foreground_task: ^8.0.0

  # 🔹 Thư viện để tạo app icon
  flutter_launcher_icons: ^0.14.4
  permission_handler: ^11.3.1
  flutter_webrtc: ^1.2.1
  flutter_ringtone_player: ^4.0.0+4
  emoji_picker_flutter: ^2.0.0

  # 🆕 Màn hình cuộc gọi đến NATIVE (full-screen + chuông đổ kể cả khi máy
  # khoá/app bị kill trên Android; CallKit trên iOS). Xem services/callkit_service.dart
  # và docs/callkit_setup.md.
  #
  # ⚠️ Version dưới đây là mốc lúc viết code này — trước khi build, chạy
  # `flutter pub add flutter_callkit_incoming` để pub tự lấy đúng bản mới
  # nhất tương thích, tránh dùng nhầm bản cũ.
  flutter_callkit_incoming: ^2.0.0

  # 🆕 Phát tiếng "tách" khi quay vòng quay nhậu (pages/spin_wheel.dart).
  # Dùng PlayerMode.lowLatency (SoundPool trên Android) để phát lặp lại
  # rất nhanh, tin cậy hơn SystemSound (không phụ thuộc "Touch sounds").
  audioplayers: ^6.0.0

  # 🆕 Đọc to (text-to-speech) kết quả các trò chơi: Thật hay thách, Chưa
  # từng, Xúc xắc phạt, Vòng quay nhậu (pages/product_detail_page.dart).
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ⚙️ Cấu hình cho flutter_launcher_icons phải để ngoài dev_dependencies
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  # 🔹 Thêm assets cho hình nền và logo
  assets:
    - assets/images/background.png
    - assets/images/logo.png
    - assets/sounds/tick.wav
    - assets/sounds/win.wav